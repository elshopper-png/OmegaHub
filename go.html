<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>OmegaHub Campaign</title>

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial,Helvetica,sans-serif;
      background:#0f172a;
      color:white;
      text-align:center;
    }

    .box{
      max-width:420px;
      padding:30px;
    }

    .loader{
      width:42px;
      height:42px;
      border:4px solid rgba(255,255,255,.25);
      border-top-color:white;
      border-radius:50%;
      margin:0 auto 20px;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }

    h1{
      font-size:24px;
      margin-bottom:10px;
    }

    p{
      color:#cbd5e1;
      font-size:15px;
    }
  </style>
</head>

<body>

  <div class="box">
    <div class="loader"></div>
    <h1>Redirigiendo...</h1>
    <p>Un momento, estamos preparando tu acceso.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="campanias.js"></script>
  <script src="motor/router.js"></script>
  <script src="motor/tracker.js"></script>
  <script src="motor/redirect.js"></script>

  <script>
    async function iniciarMotor() {
      console.log("1. Inicia motor");

      const campania = obtenerCampania();
      console.log("2. Campaña encontrada:", campania);

      if (!campania) {
        console.log("3. Campaña no encontrada");

        document.querySelector("h1").textContent = "Campaña no encontrada";
        document.querySelector("p").textContent = "Verifica el enlace de acceso.";
        return;
      }

      console.log("4. Antes de registrar");

      await registrarCampania(campania);

      console.log("5. Registro terminado");

      redirigirCampania(campania);

      console.log("6. Redirección solicitada");
    }

    iniciarMotor();
  </script>

</body>
</html>
